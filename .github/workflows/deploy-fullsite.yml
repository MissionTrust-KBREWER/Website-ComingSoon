name: Deploy Full Site to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Full Site (Copy page-fullsite to page)
        run: |
          Copy-Item -Path "./app/page-fullsite.tsx" -Destination "./app/page.tsx" -Force
        shell: pwsh

      - name: Build
        run: npm run build

      - name: Deploy Full Site to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_FULLSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/out"
          output_location: ""
          skip_app_build: true
